# Cloudflare Worker config for the hitsondrip Slack-approval endpoint.
#
# Deploy:
#   cd worker
#   wrangler deploy
#
# Set the four secrets (one-time, doesn't go into git):
#   wrangler secret put SLACK_SIGNING_SECRET
#   wrangler secret put METRICOOL_USER_TOKEN
#   wrangler secret put METRICOOL_USER_ID
#   wrangler secret put METRICOOL_BLOG_ID
#
# After deploy, the Worker URL is printed — paste it into the Slack
# app's "Interactivity & Shortcuts → Request URL" field.

name = "hitsondrip-approver"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Free-tier defaults: 100k requests/day, 10ms CPU per request.
# Our worker fires ~once-per-button-click, ~5/month expected.

# KV namespace for click deduplication. Each approval/skip click writes
# the Slack message_ts into this namespace with a 24h TTL. Subsequent
# clicks on the same message see the existing entry and no-op, so a
# user double-clicking can't create duplicate Metricool posts.
[[kv_namespaces]]
binding = "DEDUP"
id = "e564cd1c16c34426878d72f48dc86510"
